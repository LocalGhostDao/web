# LocalGhost.ai nginx configuration
# Privacy-first. No logging. No tracking.

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=localghost_limit:10m rate=50r/s;

# Separate, more generous zone for SEO/feed files that LLM crawlers hit often
limit_req_zone $binary_remote_addr zone=localghost_seo:10m rate=100r/s;

# HTTP → HTTPS redirect (both domains)
server {
    listen 80;
    listen [::]:80;
    server_name localghost.ai www.localghost.ai;
    return 301 https://www.localghost.ai$request_uri;
}

# Naked → www redirect (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name localghost.ai;

    ssl_certificate /etc/letsencrypt/live/localghost.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localghost.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://www.localghost.ai$request_uri;
}

# Main site (www)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.localghost.ai;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/localghost.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/localghost.ai/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Additional SSL hardening
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # Document root
    root /var/www/localghost.ai/public;
    index index.html;

    # ============================================
    # PRIVACY: NO LOGGING
    # ============================================
    access_log off;
    error_log /var/log/nginx/localghost.error.log crit;

    # Rate limiting (default, can be overridden per location)
    limit_req zone=localghost_limit burst=20 nodelay;

    # No server version disclosure
    server_tokens off;

    # ============================================
    # SECURITY HEADERS (server-level default)
    # ============================================
    include /etc/nginx/snippets/security-headers.conf;

    # ============================================
    # SERVER-LEVEL DEFAULT: NO CACHE
    # ============================================
    # HTML is served via extensionless try_files
    # ($uri.html). These two lines
    # set the default for every response that doesn't
    # hit a static-asset location below. Locations
    # with their own add_header override this entirely
    # (nginx replaces, not merges). Deploys are
    # visible immediately on all browsers including
    # Samsung Internet.
    expires -1;
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0" always;

    # ============================================
    # COMPRESSION
    # ============================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/xml
        font/woff
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/markdown
        text/plain
        text/xml;

    # Static assets: aggressive caching
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Images/fonts: long cache
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # SEO: SITEMAP, ROBOTS, LLM INDEXES, FEED
    # Generated at deploy time. Served with the
    # right MIME type, short cache (one hour) so
    # crawlers see fresh content after a deploy,
    # and a relaxed rate limit so LLM bots hitting
    # llms-full.txt alongside pages don't trip the
    # general 50r/s limit.
    # ============================================

    location = /robots.txt {
        allow all;
        log_not_found off;
        default_type "text/plain; charset=utf-8";
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        limit_req zone=localghost_seo burst=30 nodelay;
    }

    location = /sitemap.xml {
        allow all;
        log_not_found off;
        default_type "application/xml; charset=utf-8";
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        limit_req zone=localghost_seo burst=30 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /llms.txt {
        allow all;
        log_not_found off;
        default_type "text/markdown; charset=utf-8";
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        limit_req zone=localghost_seo burst=30 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /llms-full.txt {
        allow all;
        log_not_found off;
        default_type "text/markdown; charset=utf-8";
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        # llms-full.txt is the full archive. LLM crawlers may
        # fetch it once and link to individual posts, so a
        # generous burst matters more than rate here.
        limit_req zone=localghost_seo burst=30 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
    }

    location = /feed.xml {
        allow all;
        log_not_found off;
        default_type "application/atom+xml; charset=utf-8";
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
        add_header X-Robots-Tag "noindex" always;
        limit_req zone=localghost_seo burst=30 nodelay;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # LEGACY REDIRECTS
    # Permanent 301s — old top-level URLs moved
    # into /hard-truths/ blog structure.
    # Exact-match locations take priority over
    # the catch-all try_files below.
    # ============================================

    location = /inflection {
        return 301 https://www.localghost.ai/hard-truths/inflection;
    }

    location = /reckoning {
        return 301 https://www.localghost.ai/hard-truths/reckoning;
    }

    location = /hard-truths/get-scrappy {
        return 301 https://www.localghost.ai/hard-truths/one-bad-quarter;
    }

    # ============================================
    # LOCATIONS
    # ============================================

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # Allow access to .well-known for SSL and Local-First manifests
    location ^~ /.well-known/ {
        allow all;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # Deny hidden files (except .well-known)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny sensitive files
    location ~* \.(git|env|config|yml|yaml|toml|lock|sh|bak|swp|orig)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common exploit paths
    location ~* (wp-admin|wp-login|wp-content|wp-includes|xmlrpc\.php|\.php$) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to the raw .m4a podcast sources.
    # The deploy transcodes .m4a → .mp3; the .mp3 is
    # the public delivery artifact, the .m4a stays
    # on disk as the build source and is not served.
    location ~* \.m4a$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny access to internal deploy artifacts
    location ^~ /ghost/ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Health check (for monitoring)
    location = /health {
        return 200 'ALIVE';
        add_header Content-Type text/plain always;
        include /etc/nginx/snippets/security-headers.conf;
    }

    # ============================================
    # ERROR PAGES
    # ============================================

    error_page 404 /error/404.html;
    error_page 500 502 503 504 /error/50x.html;

    location ^~ /error/ {
        internal;
        root /var/www/localghost.ai/public;
    }

    # ============================================
    # AUDIO FILES
    # Aggressive caching, byte ranges for scrubbing,
    # no logging. Only public-facing formats here;
    # .m4a source files are denied above.
    # ============================================
    location ~* \.(mp3|aac|ogg|opus|wav)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        add_header Accept-Ranges bytes always;

        # Explicit MIME types — belt-and-braces for older nginx
        # builds that may not have the full audio family in
        # mime.types, and to guarantee browsers see the right
        # Content-Type for background playback to work.
        types {
            audio/mpeg          mp3;
            audio/aac           aac;
            audio/ogg           ogg opus;
            audio/wav           wav;
        }
        default_type            audio/mpeg;

        # Privacy: don't log podcast downloads either
        access_log off;
        log_not_found off;

        include /etc/nginx/snippets/security-headers.conf;
    }

}