  <style>
    :root{
      --ink:#1a1a17;--cream:#f6f1e8;--cream-dark:#ede6d6;
      --terracotta:#c06b47;--sage:#5e8a65;--lagoon:#3a8f84;
      --lagoon-lt:#6ab8b0;--gold:#c8a55e;--muted:#8a877f;--white:#fdfaf5;
      --fd:"Cormorant Garamond",Georgia,"Times New Roman",serif;--fb:"Jost","Helvetica Neue",Arial,sans-serif;
      --es:cubic-bezier(.25,.46,.45,.94);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{background:var(--cream);color:var(--ink);font-family:var(--fb);font-weight:300;overflow-x:hidden}

    /* NAV */
    nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:1.8rem 4rem;display:flex;justify-content:space-between;align-items:center;transition:padding .5s var(--es),background .5s var(--es)}
    nav.scrolled{padding:1rem 4rem;background:rgba(246,241,232,.97);border-bottom:1px solid rgba(26,26,23,.08)}
    .nav-logo{font-family:var(--fd);font-size:1.35rem;font-weight:400;letter-spacing:.04em;color:var(--white);text-decoration:none;transition:color .4s}
    nav.scrolled .nav-logo{color:var(--ink)}
    .nav-links{display:flex;gap:2rem;list-style:none;align-items:center}
    .nav-links a{font-size:.7rem;font-weight:400;letter-spacing:.14em;text-transform:uppercase;text-decoration:none;color:rgba(253,250,245,.75);transition:color .3s;position:relative}
    .nav-links a::after{content:"";position:absolute;bottom:-3px;left:0;width:0;height:1px;background:var(--gold);transition:width .4s var(--es)}
    .nav-links a:hover::after{width:100%}
    nav.scrolled .nav-links a{color:var(--muted)}
    nav.scrolled .nav-links a:hover{color:var(--ink)}

    /* LANGUAGE TOGGLE */
    .lang-toggle{display:flex;align-items:center;background:rgba(253,250,245,.08);border:1px solid rgba(253,250,245,.15);border-radius:100px;padding:3px;gap:1px;transition:background .4s,border-color .4s}
    nav.scrolled .lang-toggle{background:rgba(26,26,23,.06);border-color:rgba(26,26,23,.12)}
    .lang-btn{font-size:.62rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;border:none;background:none;color:rgba(253,250,245,.45);padding:.3rem .65rem;border-radius:100px;cursor:pointer;transition:background .3s,color .3s;line-height:1}
    nav.scrolled .lang-btn{color:var(--muted)}
    .lang-btn.active{background:var(--gold);color:var(--ink) !important}
    .lang-btn:hover:not(.active){color:rgba(253,250,245,.85)}
    nav.scrolled .lang-btn:hover:not(.active){color:var(--ink)}
    .nav-book{font-size:.68rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;color:var(--ink) !important;background:var(--gold);padding:.65rem 1.5rem;border-radius:100px;transition:background .3s,color .3s;white-space:nowrap;margin-left:.5rem}
    .nav-book:hover{background:var(--terracotta);color:var(--white) !important}

    /* HERO */
    .hero{position:relative;height:100vh;overflow:hidden}
    .hero-img{position:absolute;inset:0;background-size:cover;background-position:center 40%;background-image:url('/images/temp/aerial-pool-steps-woman-sitting.webp')}
    .hero-img::after{content:"";position:absolute;inset:0;background:linear-gradient(to bottom,rgba(8,16,12,.45) 0%,rgba(8,16,12,.55) 50%,rgba(8,16,12,.78) 100%)}
    .hero-content{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 2rem;z-index:2}
    .hero-eyebrow{font-size:.68rem;letter-spacing:.3em;text-transform:uppercase;color:rgba(253,250,245,.9);margin-bottom:1.8rem;opacity:0;animation:fadeUp .5s var(--es) .05s forwards;text-shadow:0 1px 12px rgba(0,0,0,.7),0 0 40px rgba(0,0,0,.4)}
    .hero-title{font-family:var(--fd);font-size:clamp(5rem,13vw,11rem);font-weight:300;line-height:.88;color:var(--white);letter-spacing:-.01em;margin-bottom:1.2rem;opacity:0;animation:fadeUp .6s var(--es) .1s forwards;text-shadow:0 2px 20px rgba(0,0,0,.6),0 0 60px rgba(0,0,0,.3)}
    .hero-title em{font-style:italic;color:var(--gold)}
    .hero-sub{font-family:var(--fd);font-size:clamp(1.05rem,2.2vw,1.5rem);font-style:italic;font-weight:300;color:rgba(253,250,245,.75);margin-bottom:3.5rem;opacity:0;animation:fadeUp .6s var(--es) .18s forwards;text-shadow:0 1px 12px rgba(0,0,0,.7)}
    .hero-cta{display:inline-flex;align-items:center;gap:1rem;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;color:var(--white);border:1px solid rgba(253,250,245,.55);padding:1.1rem 2.8rem;border-radius:100px;transition:background .4s var(--es),border-color .4s var(--es),transform .4s var(--es);opacity:0;animation:fadeUp .5s var(--es) .28s forwards}
    .hero-cta:hover{background:var(--terracotta);border-color:var(--terracotta);transform:translateY(-2px)}
    .hero-cta svg{width:15px;transition:transform .4s}
    .hero-cta:hover svg{transform:translateX(4px)}
    .scroll-hint{position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:.5rem;opacity:0;animation:fadeIn .4s ease .5s forwards}
    .scroll-hint span{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(253,250,245,.5)}
    .scroll-line{width:1px;height:48px;background:linear-gradient(to bottom,rgba(253,250,245,.5),transparent)}

    /* SHARED */
    section{position:relative}
    .container{max-width:1300px;margin:0 auto;padding:0 4rem}
    .sp{padding:9rem 0}
    .label{font-size:.63rem;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--terracotta);margin-bottom:1.2rem;display:block}
    .h2{font-family:var(--fd);font-size:clamp(2.8rem,5vw,5rem);font-weight:300;line-height:1.04;letter-spacing:-.01em}
    .h2 em{font-style:italic;color:var(--sage)}
    .body-text{font-size:1.03rem;line-height:1.85;color:var(--muted)}
    .gold-rule{width:56px;height:1px;background:var(--gold);margin:2rem 0}

    /* REVEAL */
    .

    /* STORY */
    .story{background:var(--white)}
    .story-grid{display:grid;grid-template-columns:1fr 1fr;gap:7rem;align-items:center}
    .story-visual{position:relative;height:640px}
    .s-main{position:absolute;top:0;left:0;width:75%;height:500px;object-fit:cover;border-radius:3px;box-shadow:0 8px 32px rgba(0,0,0,.12)}
    .s-accent{position:absolute;bottom:0;right:0;width:52%;height:230px;object-fit:cover;border-radius:3px;box-shadow:0 6px 20px rgba(0,0,0,.1)}
    .s-accent-caption{position:absolute;bottom:0;right:0;width:52%;padding:1.2rem 1.5rem;background:linear-gradient(to top,rgba(10,12,10,.8),transparent);border-radius:0 0 3px 3px;font-family:var(--fd);font-style:italic;font-size:.88rem;color:rgba(253,250,245,.7)}
    .story-text{padding-right:1rem}
    .founders{display:flex;gap:2rem;margin-top:3rem;padding-top:2.5rem;border-top:1px solid var(--cream-dark)}
    .founder .name{font-family:var(--fd);font-size:1.2rem;font-style:italic;display:block;margin-bottom:.25rem}
    .founder .from{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
    .fdiv{width:1px;background:var(--cream-dark);align-self:stretch}

    /* GALLERY STRIP */
    .gstrip{display:grid;grid-template-columns:repeat(5,1fr);height:260px;gap:3px}
    .gstrip-item{overflow:hidden}
    .gstrip-item img{width:100%;height:100%;object-fit:cover;display:block}
    

    /* ROOMS */
    .rooms{background:var(--cream)}
    .rooms-header{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:4rem;gap:3rem;flex-wrap:wrap}
    .rooms-tabs{display:flex;gap:.5rem;margin-bottom:3rem}
    .tab-btn{font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;background:none;border:1px solid var(--cream-dark);color:var(--muted);padding:.7rem 1.6rem;border-radius:100px;cursor:pointer;transition:background .35s,color .35s,border-color .35s}
    .tab-btn.active,.tab-btn:hover{background:var(--ink);border-color:var(--ink);color:var(--white)}
    .tab-panel{display:none}
    .tab-panel.active{display:block}
    .room-grid{display:grid;grid-template-columns:1.35fr 1fr;gap:4px;border-radius:4px;overflow:hidden;height:580px}
    .room-main{position:relative;overflow:hidden;height:580px}
    .room-main img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    
    .room-side{display:grid;grid-template-rows:287px 287px;gap:6px}
    .room-side-img{position:relative;overflow:hidden}
    .room-side-img img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
    
    .room-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2.2rem;background:linear-gradient(to top,rgba(10,12,8,.85) 0%,transparent 55%);pointer-events:none}
    .room-tag{font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:var(--gold);margin-bottom:.5rem}
    .room-title{font-family:var(--fd);font-size:1.7rem;font-weight:300;color:var(--white);line-height:1.05}
    .room-desc{font-size:.85rem;line-height:1.68;color:rgba(253,250,245,.55);margin-top:.6rem}
    .room-features{display:flex;gap:1.5rem;margin-top:3rem;flex-wrap:wrap}
    .feat{display:flex;align-items:center;gap:.6rem;font-size:.78rem;letter-spacing:.06em;color:var(--muted)}
    .feat svg{width:16px;flex-shrink:0;color:var(--sage)}

    /* ACTIVITIES */
    .activities{background:var(--ink)}
    .act-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-top:4rem;border-radius:4px;overflow:hidden}
    .act-card{position:relative;overflow:hidden;height:440px;cursor:default;background:#0a0c0a}
    .act-card img{width:100%;height:100%;object-fit:cover}
    
    .act-body{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2.2rem;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.4) 50%,rgba(0,0,0,.05) 100%)}
    .act-num{font-family:var(--fd);font-size:4rem;font-weight:300;opacity:.18;color:var(--white);line-height:1;margin-bottom:.2rem;letter-spacing:-.02em}
    .act-title{font-family:var(--fd);font-size:1.45rem;font-weight:300;color:var(--white);line-height:1.08;margin-bottom:.6rem;text-shadow:0 1px 12px rgba(0,0,0,.5)}
    .act-sub{font-size:.63rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(253,250,245,.72);text-shadow:0 1px 8px rgba(0,0,0,.6)}

    /* SAILING */
    .sailing{position:relative;height:68vh;min-height:500px}
    .sailing-bg{position:absolute;inset:0;background-size:cover;background-position:center}
    .sailing-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(130deg,rgba(8,18,24,.78) 0%,rgba(8,18,24,.28) 65%,transparent 100%)}
    .sailing-body{position:relative;z-index:2;height:100%;display:flex;align-items:flex-end;padding:5rem 6rem}
    .sailing-txt{max-width:480px}
    .sailing-txt .label{color:var(--lagoon-lt)}
    .sailing-h{font-family:var(--fd);font-size:clamp(2.4rem,5vw,4.2rem);font-weight:300;color:var(--white);line-height:1.04;margin-bottom:1.4rem}
    .sailing-h em{font-style:italic;color:var(--lagoon-lt)}
    .sailing-p{font-size:.97rem;line-height:1.8;color:rgba(253,250,245,.58);max-width:40ch}

    /* HIGHLIGHTS BAR */
    .highlights{background:var(--ink);padding:3.5rem 0;border-top:1px solid rgba(253,250,245,.04);border-bottom:1px solid rgba(253,250,245,.04)}
    .highlights-inner{max-width:1300px;margin:0 auto;padding:0 4rem;display:flex;justify-content:space-between;align-items:center;gap:2rem;flex-wrap:wrap;box-sizing:border-box}
    .hl{display:flex;flex-direction:column;align-items:center;gap:.5rem;flex:1;min-width:120px}
    .hl-icon{width:28px;height:28px;color:var(--gold);opacity:.8}
    .hl-label{font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:rgba(253,250,245,.35);text-align:center}
    .hl-value{font-family:var(--fd);font-size:1.25rem;font-style:italic;font-weight:300;color:rgba(253,250,245,.75);text-align:center}
    .hl-div{width:1px;height:36px;background:rgba(253,250,245,.07);flex-shrink:0}

    /* PEOPLE */
    .people{background:var(--ink);color:var(--white)}
    .people-intro{text-align:center;padding:7rem 2rem 5rem}
    .people-grid{display:grid;grid-template-columns:1fr 1fr}
    .pp{padding:6rem 5rem;position:relative;overflow:hidden}
    .pp:first-child{border-right:1px solid rgba(253,250,245,.05)}
    /* pp::before hover gradient removed — was forcing composite layer */
    .pp-img{width:100%;height:620px;object-fit:cover;object-position:center top;border-radius:3px;margin-bottom:2.5rem}
    .pp-init{font-family:var(--fd);font-size:7.5rem;font-weight:300;line-height:1;opacity:.09;position:absolute;top:2rem;right:2.5rem;letter-spacing:-.04em}
    .mari .pp-init{color:var(--terracotta);opacity:.13}
    .chiku .pp-init{color:var(--gold);opacity:.13}
    .pp-role{font-size:.62rem;letter-spacing:.28em;text-transform:uppercase;color:var(--terracotta);margin-bottom:1.2rem;display:block}
    .chiku .pp-role{color:var(--gold)}
    .pp-name{font-family:var(--fd);font-size:3rem;font-weight:300;margin-bottom:1.8rem;line-height:1}
    .pp-body{font-size:.97rem;line-height:1.85;color:rgba(253,250,245,.48);max-width:44ch}
    .pp-quote{margin-top:2rem;padding-left:1.5rem;border-left:2px solid var(--terracotta)}
    .chiku .pp-quote{border-left-color:var(--gold)}
    .pp-quote p{font-family:var(--fd);font-size:1.15rem;font-style:italic;font-weight:300;color:rgba(253,250,245,.7);line-height:1.55}

    /* LOCATION */
    .location{background:var(--white)}
    .loc-grid{display:grid;grid-template-columns:1fr 1.25fr;gap:8rem;align-items:center}
    .dist-list{list-style:none;margin-top:3rem}
    .dist-item{display:grid;grid-template-columns:1fr auto;align-items:baseline;padding:1.3rem 0;border-bottom:1px solid var(--cream-dark);gap:1rem}
    .dist-item:first-child{border-top:1px solid var(--cream-dark)}
    .dist-place{font-family:var(--fd);font-size:1.15rem;font-weight:400}
    .dist-detail{font-size:.68rem;letter-spacing:.14em;text-transform:uppercase;color:var(--terracotta);white-space:nowrap}
    .loc-photos{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:4px;border-radius:4px;overflow:hidden}
    .loc-photo{overflow:hidden}
    .loc-photo:first-child{grid-row:1/3;height:520px}
    .loc-photo:not(:first-child){height:258px}
    .loc-photo img{width:100%;height:100%;object-fit:cover;display:block}
    

    /* INSTAGRAM */
    .ig-section{background:var(--ink);padding:8rem 0}
    .ig-header{text-align:center;margin-bottom:4rem}
    .ig-header .label{color:var(--gold);display:block;margin-bottom:.8rem}
    .ig-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:3px}
    .ig-cell{position:relative;overflow:hidden;aspect-ratio:1;display:block;cursor:pointer}
    .ig-cell img{width:100%;height:100%;object-fit:cover}
    
    .ig-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.6rem;background:rgba(8,12,10,.22);opacity:1;transition:opacity .3s}
    .ig-cell:hover .ig-overlay{background:rgba(8,12,10,.55)}
    .ig-overlay svg{width:28px;color:white}
    .ig-cta{text-align:center;margin-top:3rem}
    .ig-btn{display:inline-flex;align-items:center;gap:.8rem;font-size:.7rem;font-weight:500;letter-spacing:.16em;text-transform:uppercase;text-decoration:none;color:var(--white);background:var(--terracotta);padding:1rem 2.5rem;border-radius:100px;transition:background .3s,transform .3s}

    .mob-close:hover{color:var(--white)}

    /* LIGHTBOX */
    .lb-trigger{cursor:zoom-in !important}
    .room-main.lb-trigger,.room-side-img.lb-trigger{cursor:zoom-in}
    #lightbox{position:fixed;inset:0;z-index:10000;background:rgba(8,10,8,.96);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .35s}

    .lb-prev,.lb-next{position:fixed;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(253,250,245,.4);cursor:pointer;padding:1rem;z-index:10001;transition:color .2s;line-height:1}

  let currentLang = localStorage.getItem('cc_lang') || 'en';

  function setLang(lang) {
    currentLang = lang;
    localStorage.setItem('cc_lang', lang);
    document.documentElement.lang = lang;
    const t = T[lang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (!t[key]) return;
      if (/</.test(t[key])) { el.innerHTML = t[key]; } else { el.textContent = t[key]; }
    });
    // Hero CTA: preserve SVG child
    const heroCta = document.querySelector('.hero-cta');
    if (heroCta) {
      const svg = heroCta.querySelector('svg');
      const span = heroCta.querySelector('span[data-i18n]');
      if (span) span.textContent = t['hero.cta'];
    }

    document.querySelectorAll('.lang-btn, .m-lang button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
    });
  }

  let ticking = false, wasScrolled = false;
  window.addEventListener('scroll', () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const sy = scrollY;
        const isScrolled = sy > 60;
        if (isScrolled !== wasScrolled) {
          nav.classList.toggle('scrolled', isScrolled);
          wasScrolled = isScrolled;
        }
        ticking = false;
      });
      ticking = true;
    }
  }, { passive: true });

  // ── TABS ─────────────────────────────────────────────────────────────────
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', ['bungalow','apartment','pool'][i] === name);
    });
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
  }

  // ── SMOOTH ANCHORS ───────────────────────────────────────────────────────
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const t = document.querySelector(a.getAttribute('href'));
      if(t){ e.preventDefault(); t.scrollIntoView({behavior:'smooth',block:'start'}); }
    });
  });
  
  // ── HAMBURGER ────────────────────────────────────────────────────────────
  const hbg = document.getElementById('hamburger');
  const mob = document.getElementById('mobileMenu');
  hbg.addEventListener('click', () => {
    const opening = !mob.classList.contains('open');
    if (opening) {
      mob.classList.add('open');
      document.body.style.overflow = 'hidden';
    } else {
      closeMobile();
    }
    hbg.classList.toggle('open');
  });
  // Tap outside (on the overlay background) to close
  mob.addEventListener('click', e => {
    if (e.target === mob) closeMobile();
  });
  function closeMobile() {
    hbg.classList.remove('open');
    mob.classList.remove('open');
    document.body.style.overflow = '';
  }

  // ── LIGHTBOX ─────────────────────────────────────────────────────────────
  const lb       = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lbImg');
  const lbClose  = document.getElementById('lbClose');
  const lbPrev   = document.getElementById('lbPrev');
  const lbNext   = document.getElementById('lbNext');
  const lbCaption= document.getElementById('lbCaption');
  const lbCounter= document.getElementById('lbCounter');

  let lbImages = []; // [{src, alt}]
  let lbIndex  = 0;

  function buildLightbox() {
    // Collect all clickable images — every <img> inside a known image container
    const imgSelectors = [
      '.gstrip-item img',
      '.act-card img',
      '.s-main',
      '.s-accent',
      '.pp-img',
      '.loc-photo img',
      '.cta-main',
      '.cta-sm'
    ];
    lbImages = [];

    // Helper to register a clickable element
    function register(el, src, alt) {
      if (el.closest('#lightbox')) return;
      const idx = lbImages.length;
      lbImages.push({ src, alt });
      el.classList.add('lb-trigger');
      el.setAttribute('data-lb-index', idx);
      el.addEventListener('click', () => openLb(+el.dataset.lbIndex));
    }

    // Room panels — register in tab order: bungalow, apartment, pool
    // Each tab: main image first, then side images top-to-bottom
    ['tab-bungalow','tab-apartment','tab-pool'].forEach(tabId => {
      const tab = document.getElementById(tabId);
      if (!tab) return;
      const main = tab.querySelector('.room-main');
      if (main) { const img = main.querySelector('img'); if (img) register(main, img.src, img.alt); }
      tab.querySelectorAll('.room-side-img').forEach(side => {
        const img = side.querySelector('img');
        if (img) register(side, img.src, img.alt);
      });
    });

    // Direct image-based
    imgSelectors.forEach(sel => {
      document.querySelectorAll(sel).forEach(img => {
        register(img, img.src, img.alt);
      });
    });
  }

  function openLb(index) {
    lbIndex = ((index % lbImages.length) + lbImages.length) % lbImages.length;
    lbImg.src = lbImages[lbIndex].src;
    lbImg.alt = lbImages[lbIndex].alt;
    lbCaption.textContent = lbImages[lbIndex].alt;
    lbCounter.textContent = (lbIndex + 1) + ' / ' + lbImages.length;
    lb.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeLb() {
    lb.classList.remove('open');
    document.body.style.overflow = '';
    setTimeout(() => { lbImg.src = ''; }, 350);
  }

  lbClose.addEventListener('click', closeLb);
  lbPrev.addEventListener('click', () => openLb(lbIndex - 1));
  lbNext.addEventListener('click', () => openLb(lbIndex + 1));
  lb.addEventListener('click', e => { if (e.target === lb) closeLb(); });
  document.addEventListener('keydown', e => {
    if (!lb.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') openLb(lbIndex - 1);
    if (e.key === 'ArrowRight') openLb(lbIndex + 1);
  });

  // Touch swipe support
  let lbTouchX = 0;
  lb.addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; }, { passive: true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - lbTouchX;
    if (Math.abs(dx) > 50) dx < 0 ? openLb(lbIndex + 1) : openLb(lbIndex - 1);
  }, { passive: true });

  buildLightbox();

  </script>
</body>
</html>
