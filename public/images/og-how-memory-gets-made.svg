  <!-- Subtitle: the hook, broken into two centered lines -->
  <text x="600" y="348"
        font-family="'Courier New', 'Courier', monospace"
        font-size="24"
        font-weight="400"
        fill="#a8b2bd"
        text-anchor="middle"
        letter-spacing="0.5">Have you ever considered how a computer</text>
  <text x="600" y="384"
        font-family="'Courier New', 'Courier', monospace"
        font-size="24"
        font-weight="400"
        fill="#a8b2bd"
        text-anchor="middle"
        letter-spacing="0.5">representation of your brain would work?</text>

  <!-- Single centered tag with the post's core claim -->
  <rect x="340" y="435" width="520" height="42"
        fill="none"
        stroke="#33ff00"
        stroke-opacity="0.5"
        stroke-width="1"/>
  <text x="600" y="462"
        font-family="'Courier New', 'Courier', monospace"
        font-size="16"
        font-weight="700"
