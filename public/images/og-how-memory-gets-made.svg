  <!-- Divider under header -->
  <line x1="88" y1="128" x2="1112" y2="128"
        stroke="#33ff00" stroke-width="1" stroke-opacity="0.3"/>

  <!-- Main title -->
  <text x="600" y="270"
        font-family="'Courier New', 'Courier', monospace"
        font-size="82"
        font-weight="700"
        fill="#ff8a8a"
        text-anchor="middle"
