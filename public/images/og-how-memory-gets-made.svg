<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="How Memory Gets Made — LocalGhost Hard Truths POST_09">

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e14"/>
      <stop offset="100%" stop-color="#050709"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#33ff00" stroke-width="0.5" stroke-opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Huge faded ! echoing the statement-box -->
  <text x="600" y="540"
        font-family="'Courier New', 'Courier', monospace"
        font-size="800"
        font-weight="700"
        fill="#ff8a8a"
        fill-opacity="0.04"
        text-anchor="middle">!</text>

  <!-- Outer frame -->
  <rect x="60" y="60" width="1080" height="510"
        fill="none"
        stroke="#ff8a8a"
        stroke-width="1"
        stroke-opacity="0.5"/>

  <!-- Top bar: terminal prompt + post number -->
  <text x="88" y="108"
        font-family="'Courier New', 'Courier', monospace"
        font-size="17"
        font-weight="700"
        fill="#33ff00"
        letter-spacing="3">&gt; LOCALGHOST.AI // HARD_TRUTHS</text>

  <text x="1112" y="108"
        font-family="'Courier New', 'Courier', monospace"
        font-size="17"
        font-weight="700"
        fill="#33ff00"
        letter-spacing="3"
