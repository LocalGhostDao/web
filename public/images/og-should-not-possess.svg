<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img">
<title>A Ghost Should Not Possess, LocalGhost Hard Truths</title>
<desc>LocalGhost.ai social card for the Hard Truths post on the twenty-eight patterns of possession and what an anti-possession daemon does about each one.</desc>

<defs>
<pattern id="scanlines" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
