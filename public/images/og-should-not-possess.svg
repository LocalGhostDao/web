<text x="80" y="232" class="mono text" font-size="78" font-weight="700">A Ghost Should</text>
<text x="80" y="322" class="mono text" font-size="78" font-weight="700">Not Possess</text>

<line x1="80" y1="378" x2="200" y2="378" stroke="#33FF00" stroke-width="2"/>

<text x="80" y="432" class="mono text-dim" font-size="22" font-weight="400">The same manipulation patterns that built the slot</text>
<text x="80" y="464" class="mono text-dim" font-size="22" font-weight="400">machine, the cult, and the social media feed</text>
<text x="80" y="496" class="mono text-dim" font-size="22" font-weight="400">are aimed at you through your AI.</text>

<line x1="80" y1="556" x2="1120" y2="556" class="divider" stroke-width="1"/>

<text x="80" y="586" class="mono green" font-size="20" font-weight="500" letter-spacing="2" filter="url(#glow)">&gt; LOCALGHOST.AI</text>
<text x="305" y="586" class="mono text-dim" font-size="16" font-weight="400">| THE ONLY CLOUD IS YOU</text>

<text x="1120" y="586" class="mono dim" font-size="18" font-weight="500" text-anchor="end" letter-spacing="1">ghost.shadowd</text>

