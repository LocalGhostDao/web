<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="scanlines" x="0" y="0" width="1200" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1200" height="2" fill="transparent"/>
      <rect x="0" y="2" width="1200" height="2" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <filter id="green-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="red-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#111111"/>
  <rect width="1200" height="630" fill="url(#scanlines)"/>

  <!-- Terminal block — left -->
  <!-- Outer border -->
  <rect x="55" y="170" width="255" height="290" fill="#1a1a1a" stroke="#444444" stroke-width="1"/>
  <!-- Chrome bar -->
  <rect x="55" y="170" width="255" height="28" fill="#222222"/>
  <!-- Traffic lights -->
  <circle cx="80"  cy="184" r="6" fill="#FF5F56"/>
  <circle cx="102" cy="184" r="6" fill="#FFBD2E"/>
  <circle cx="124" cy="184" r="6" fill="#27C93F"/>

  <!-- Terminal content -->
  <!-- ls pipeline/ -->
  <text x="72" y="230" font-family="'Courier New',monospace" font-size="15" fill="#33FF00">$ ls pipeline/</text>
  <text x="92" y="252" font-family="'Courier New',monospace" font-size="15" fill="#606060">juniors/</text>
  <text x="92" y="274" font-family="'Courier New',monospace" font-size="15" fill="#606060">seniors/</text>
  <text x="92" y="296" font-family="'Courier New',monospace" font-size="15" fill="#606060">knowledge/</text>
  <text x="92" y="318" font-family="'Courier New',monospace" font-size="15" fill="#606060">mentors/</text>
  <!-- rm -rf pipeline/ -->
  <text x="72" y="340" font-family="'Courier New',monospace" font-size="15" fill="#33FF00">$ rm -rf pipeline/</text>
  <text x="92" y="362" font-family="'Courier New',monospace" font-size="15" fill="#FF8A8A">removing juniors/</text>
  <text x="92" y="384" font-family="'Courier New',monospace" font-size="15" fill="#FF8A8A">removing seniors/</text>
  <text x="92" y="406" font-family="'Courier New',monospace" font-size="15" fill="#FF8A8A">removing knowledge/</text>
  <!-- cursor -->
  <text x="72" y="428" font-family="'Courier New',monospace" font-size="15" fill="#33FF00">$ █</text>

  <!-- Red border box — right -->
  <rect x="340" y="65" width="810" height="425" fill="rgba(255,138,138,0.03)" stroke="#FF8A8A" stroke-width="2"/>

  <!-- SOFTWARE MANAGERS — grey -->
  <text x="745" y="185" font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700"
        fill="#a0a0a0" text-anchor="middle" letter-spacing="4">SOFTWARE MANAGERS</text>

  <!-- PROTECTION RACKET — red -->
  <text x="745" y="268" font-family="'Courier New',Courier,monospace" font-size="64" font-weight="700"
        fill="#FF8A8A" text-anchor="middle" letter-spacing="4"
        filter="url(#red-glow)">PROTECTION RACKET</text>

  <!-- Subtitle — green -->
  <text x="745" y="345" font-family="'Courier New',Courier,monospace" font-size="30"
        fill="#33FF00" text-anchor="middle"
        filter="url(#green-glow)">with a Confluence page.</text>

  <!-- Subtext — dim -->
  <text x="745" y="395" font-family="'Courier New',Courier,monospace" font-size="19"
        fill="#555555" text-anchor="middle">The migration never ends. Neither does their purpose.</text>

  <!-- Separator -->
  <line x1="380" y1="428" x2="1110" y2="428" stroke="#333333" stroke-width="1"/>

  <!-- Alarm label -->
  <text x="745" y="455" font-family="'Courier New',Courier,monospace" font-size="16"
        fill="#FF8A8A" text-anchor="middle" letter-spacing="2">&gt; ALARM  //  POST_03  //  HARD TRUTHS</text>

  <!-- URL -->
  <text x="600" y="572" font-family="'Courier New',Courier,monospace" font-size="22"
        fill="#33FF00" text-anchor="middle" letter-spacing="2"
        filter="url(#green-glow)">&gt; LOCALGHOST.AI/HARD-TRUTHS/SKILLCRAFT</text>
</svg>
